<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Invoice</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
<script src="supabase.js"></script>

<style>
:root{
  --page-width: 1000px;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  background:#f3f3f3;
  font-family: Arial, Helvetica, sans-serif;
  color:#111;
}

.toolbar{
  position: sticky;
  top: 0;
  z-index: 20;
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px 12px;
  background:rgba(243,243,243,.94);
  backdrop-filter: blur(6px);
}

.toolbar a,
.toolbar button{
  border:0;
  border-radius:8px;
  padding:8px 14px;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  text-decoration:none;
  color:#fff;
  background:#232323;
}

.toolbar .primary{
  background:#d61d1d;
}

.page-wrap{
  width:min(100%, var(--page-width));
  margin: 8px auto 24px;
  padding: 0 12px 24px;
}

.invoice{
  position:relative;
  width:100%;
  aspect-ratio: 1000 / 1414;
  background: url('invoice-template.png') center top / 100% 100% no-repeat;
  box-shadow: 0 16px 40px rgba(0,0,0,.12);
  overflow:hidden;
}

.field{
  position:absolute;
  font-size: 12px;
  line-height: 1.15;
  font-weight: 700;
  color:#111;
  white-space: nowrap;
  overflow:hidden;
  text-overflow: ellipsis;
}

.small{
  font-size: 11px;
  font-weight: 700;
}

.muted{
  font-weight:600;
}

.red{
  color:#d31b1b;
}

.center{
  text-align:center;
}

.right{
  text-align:right;
}

/* Top row */
.invoice-no{ left: 83px; top: 236px; width: 145px; }
.date-no{ left: 285px; top: 236px; width: 105px; }
.ref-no{ left: 457px; top: 236px; width: 175px; }
.verif-no{ left: 736px; top: 236px; width: 180px; color:#d31b1b; }

/* Insured details */
.insured-name{ left: 93px; top: 385px; width: 355px; }
.insured-country{ left: 93px; top: 410px; width: 355px; font-weight:600; }
.insured-city{ left: 93px; top: 436px; width: 355px; font-weight:600; }

/* Vehicle details left box */
.year-of-mfr{ left: 332px; top: 548px; width: 150px; }
.engine-no{ left: 332px; top: 580px; width: 180px; }
.chassis-no{ left: 332px; top: 612px; width: 220px; font-size: 11px; }
.type-of-body{ left: 332px; top: 644px; width: 150px; }
.make-model{ left: 332px; top: 676px; width: 190px; }
.vehicle-permit{ left: 332px; top: 708px; width: 160px; }
.seating-capacity{ left: 332px; top: 740px; width: 150px; }
.vehicle-plate-no{ left: 332px; top: 772px; width: 160px; }
.vehicle-color{ left: 332px; top: 804px; width: 150px; }
.insured-value{ left: 332px; top: 836px; width: 180px; }

/* Insurance details box */
.insurance-company{ left: 565px; top: 546px; width: 290px; }
.insurance-from{ left: 756px; top: 639px; width: 110px; text-align:left; }
.insurance-till{ left: 756px; top: 670px; width: 110px; text-align:left; }

/* Total amount box */
.total-amount-currency{ left: 728px; top: 848px; width: 120px; text-align:center; font-size: 38px; color:#d31b1b; }
.total-amount-value{ left: 740px; top: 920px; width: 160px; text-align:center; font-size: 22px; color:#d31b1b; }

/* QR placeholder */
.qr-box{
  position:absolute;
  right: 53px;
  bottom: 74px;
  width: 105px;
  height: 105px;
  border: 3px solid #d61d1d;
  border-radius: 10px;
  background:#fff;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}
.qr-note{
  position:absolute;
  right: 28px;
  bottom: 22px;
  width: 150px;
  font-size: 13px;
  text-align:center;
  font-weight: 500;
  line-height: 1.15;
}

@media (max-width: 1100px){
  .page-wrap{ padding: 0 8px 16px; }
  .field{ font-size: 11px; }
  .total-amount-currency{ font-size: 34px; }
  .total-amount-value{ font-size: 20px; }
}

@media print{
  body{ background:#fff; }
  .toolbar{ display:none !important; }
  .page-wrap{ width:100%; margin:0; padding:0; }
  .invoice{ box-shadow:none; }
  @page{ size:A4 portrait; margin:0; }
}
</style>
</head>
<body>

<div class="toolbar">
  <a href="dashboard.html">Back</a>
  <button class="primary" onclick="window.print()">Print / Save PDF</button>
</div>

<div class="page-wrap">
  <div class="invoice" id="invoice">
    <div class="field invoice-no" id="invoice_number"></div>
    <div class="field date-no" id="invoice_date"></div>
    <div class="field ref-no" id="ref_number"></div>
    <div class="field verif-no" id="verification_id"></div>

    <div class="field insured-name" id="insured_name"></div>
    <div class="field insured-country" id="insured_country"></div>
    <div class="field insured-city" id="insured_city"></div>

    <div class="field year-of-mfr" id="year_of_mfr"></div>
    <div class="field engine-no" id="engine_no"></div>
    <div class="field chassis-no" id="chassis_no"></div>
    <div class="field type-of-body" id="type_of_body"></div>
    <div class="field make-model" id="make_model"></div>
    <div class="field vehicle-permit" id="vehicle_permit"></div>
    <div class="field seating-capacity" id="seating_capacity"></div>
    <div class="field vehicle-plate-no" id="vehicle_plate_no"></div>
    <div class="field vehicle-color" id="vehicle_color"></div>
    <div class="field insured-value" id="insured_vehicle_value"></div>

    <div class="field insurance-company" id="insurance_company"></div>
    <div class="field insurance-from" id="insurance_from"></div>
    <div class="field insurance-till" id="insurance_till"></div>

    <div class="field total-amount-currency">AED</div>
    <div class="field total-amount-value" id="total_amount"></div>

    <div class="qr-box"><div id="qr"></div></div>
    <div class="qr-note">Scan to verify<br>this invoice</div>
  </div>
</div>

<script>
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const params = new URLSearchParams(window.location.search);
const verificationId = params.get("id");

function safeText(value) {
  if (value === null || value === undefined || value === "") return "—";
  return String(value);
}

function formatDate(value) {
  if (!value) return "—";
  const d = new Date(value);
  if (Number.isNaN(d.getTime())) return String(value);
  return d.toLocaleDateString("en-GB");
}

function money(value) {
  if (value === null || value === undefined || value === "") return "—";
  return String(value);
}

async function loadInvoice(){
  const { data, error } = await supabaseClient
    .from("invoices")
    .select("*")
    .eq("verification_id", verificationId)
    .single();

  if (error || !data) {
    alert("Invoice Not Found");
    return;
  }

  document.getElementById("invoice_number").innerText = safeText(data.invoice_number);
  document.getElementById("invoice_date").innerText = formatDate(data.invoice_date);
  document.getElementById("ref_number").innerText = safeText(data.ref_number);
  document.getElementById("verification_id").innerText = safeText(data.verification_id);

  document.getElementById("insured_name").innerText = safeText(data.insured_name);
  document.getElementById("insured_country").innerText = safeText(data.insured_country);
  document.getElementById("insured_city").innerText = safeText(data.insured_city);

  document.getElementById("year_of_mfr").innerText = safeText(data.year_of_mfr);
  document.getElementById("engine_no").innerText = safeText(data.engine_no);
  document.getElementById("chassis_no").innerText = safeText(data.chassis_no);
  document.getElementById("type_of_body").innerText = safeText(data.type_of_body);
  document.getElementById("make_model").innerText = safeText(data.make_model);
  document.getElementById("vehicle_permit").innerText = safeText(data.vehicle_permit);
  document.getElementById("seating_capacity").innerText = safeText(data.seating_capacity);
  document.getElementById("vehicle_plate_no").innerText = safeText(data.vehicle_plate_no);
  document.getElementById("vehicle_color").innerText = safeText(data.vehicle_color);
  document.getElementById("insured_vehicle_value").innerText = safeText(data.insured_vehicle_value);

  document.getElementById("insurance_company").innerText = safeText(data.insurance_company);
  document.getElementById("insurance_from").innerText = formatDate(data.insurance_from);
  document.getElementById("insurance_till").innerText = formatDate(data.insurance_till);

  document.getElementById("total_amount").innerText = money(data.total_amount);

  const qrValue = `${window.location.origin}${window.location.pathname.replace("invoice.html", "verify.html")}?id=${encodeURIComponent(data.verification_id)}`;

  new QRCode(document.getElementById("qr"), {
    text: qrValue,
    width: 96,
    height: 96,
    colorDark: "#111111",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.M
  });
}

loadInvoice();
</script>

</body>
</html>
