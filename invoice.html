<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Invoice</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    padding:30px;
}

.invoice{
    background:white;
    max-width:1000px;
    margin:auto;
    padding:40px;
    border:1px solid #ddd;
}

.header{
    display:flex;
    justify-content:space-between;
    margin-bottom:30px;
}

.section{
    margin-top:25px;
}

table{
    width:100%;
    border-collapse:collapse;
}

td{
    border:1px solid #ccc;
    padding:10px;
}

.title{
    text-align:center;
    font-size:28px;
    font-weight:bold;
}
</style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
</head>
<script>

const supabaseClient = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

const params = new URLSearchParams(window.location.search);

const verificationId = params.get("id");

loadInvoice();

async function loadInvoice(){

    const { data, error } =
    await supabaseClient
    .from("invoices")
    .select("*")
    .eq("verification_id", verificationId)
    .single();

    if(error){
        alert("Invoice Not Found");
        return;
    }

    document.getElementById("invoice_number").innerText =
        data.invoice_number;

    document.getElementById("verification_id").innerText =
        data.verification_id;

    document.getElementById("insured_name").innerText =
        data.insured_name;

    document.getElementById("insured_country").innerText =
        data.insured_country;

    document.getElementById("insured_city").innerText =
        data.insured_city;

    document.getElementById("make_model").innerText =
        data.make_model;

    document.getElementById("engine_no").innerText =
        data.engine_no;

    document.getElementById("chassis_no").innerText =
        data.chassis_no;

    document.getElementById("vehicle_color").innerText =
        data.vehicle_color;

    document.getElementById("insurance_company").innerText =
        data.insurance_company;

    document.getElementById("insurance_from").innerText =
        data.insurance_from;

    document.getElementById("insurance_till").innerText =
        data.insurance_till;

    document.getElementById("total_amount").innerText =
        data.total_amount;
}

</script>
<body>

<div class="invoice">

<div class="header">
    <div>
        <h2>Tameen Insurance</h2>
    </div>

    <div>
        <b>Invoice Number:</b>
        <span id="invoice_number"></span>
        <br>

        <b>Verification ID:</b>
        <span id="verification_id"></span>
    </div>
</div>

<div class="title">
    Motor Insurance Certificate
</div>

<div class="section">
<h3>Insured Details</h3>

<table>
<tr>
<td>Name</td>
<td id="insured_name"></td>
</tr>

<tr>
<td>Country</td>
<td id="insured_country"></td>
</tr>

<tr>
<td>City</td>
<td id="insured_city"></td>
</tr>
</table>
</div>

<div class="section">
<h3>Vehicle Details</h3>

<table>
<tr>
<td>Make & Model</td>
<td id="make_model"></td>
</tr>

<tr>
<td>Engine No</td>
<td id="engine_no"></td>
</tr>

<tr>
<td>Chassis No</td>
<td id="chassis_no"></td>
</tr>

<tr>
<td>Vehicle Color</td>
<td id="vehicle_color"></td>
</tr>
</table>
</div>

<div class="section">
<h3>Insurance Details</h3>

<table>
<tr>
<td>Insurance Company</td>
<td id="insurance_company"></td>
</tr>

<tr>
<td>From</td>
<td id="insurance_from"></td>
</tr>

<tr>
<td>Till</td>
<td id="insurance_till"></td>
</tr>

<tr>
<td>Total Amount</td>
<td id="total_amount"></td>
</tr>
</table>
</div>

</div>

</body>
</html>
