<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<style>
:root{
    --page-w: 1000px;
    --page-h: 1453px;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#ececec;
    color:#111;
}

.toolbar{
    max-width: var(--page-w);
    margin: 18px auto 0;
    display:flex;
    justify-content:flex-end;
    gap:10px;
    padding: 0 12px;
}

.toolbar button{
    border:0;
    border-radius:10px;
    padding:10px 16px;
    cursor:pointer;
    font-weight:700;
    background:#d91414;
    color:#fff;
}

.toolbar button.secondary{
    background:#333;
}

.stage{
    width:min(100vw, var(--page-w));
    margin: 12px auto 30px;
    position:relative;
}

.invoice-page{
    position:relative;
    width:100%;
    aspect-ratio: 1000 / 1453;
    background-image:url('https://mmash10.github.io/tameen-invoices/invoice-template.png');
    background-repeat:no-repeat;
    background-size:100% 100%;
    background-position:center center;
    overflow:hidden;
    box-shadow:0 12px 40px rgba(0,0,0,.12);
    background-color:#fff;
}

.field{
    position:absolute;
    z-index:2;
    color:#111;
    font-size: clamp(11px, 1.35vw, 16px);
    line-height:1.15;
    font-weight:700;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width: 28%;
}

.field.light{
    font-weight:600;
}

.field.red{
    color:#d21414;
    font-weight:800;
}

.field.center{
    text-align:center;
}

.field.right{
    text-align:right;
}

#invoice_number{ top: 27.0%; left: 13.2%; width: 18%; }
#invoice_date{ top: 27.0%; left: 35.3%; width: 13%; }
#ref_number{ top: 27.0%; left: 59.0%; width: 17%; }
#verification_id{ top: 27.0%; left: 82.0%; width: 16%; }

#insured_name{ top: 36.8%; left: 12.0%; width: 32%; }
#insured_country{ top: 38.9%; left: 12.0%; width: 32%; }
#insured_city{ top: 41.0%; left: 12.0%; width: 32%; }

#year_of_mfr{ top: 54.6%; left: 33.0%; width: 23%; }
#engine_no{ top: 57.5%; left: 33.0%; width: 23%; }
#chassis_no{ top: 60.4%; left: 33.0%; width: 23%; }
#type_of_body{ top: 63.4%; left: 33.0%; width: 23%; }
#make_model{ top: 66.3%; left: 33.0%; width: 23%; }
#vehicle_permit{ top: 69.2%; left: 33.0%; width: 23%; }
#seating_capacity{ top: 72.1%; left: 33.0%; width: 23%; }
#vehicle_plate_no{ top: 75.0%; left: 33.0%; width: 23%; }
#vehicle_color{ top: 78.0%; left: 33.0%; width: 23%; }
#insured_vehicle_value{ top: 80.9%; left: 33.0%; width: 23%; }

#insurance_company{ top: 56.8%; left: 62.0%; width: 24%; }
#insurance_from{ top: 61.4%; left: 75.0%; width: 14%; }
#insurance_till{ top: 63.6%; left: 75.0%; width: 14%; }

#total_amount{
    top: 74.9%;
    left: 69.0%;
    width: 23%;
    font-size: clamp(28px, 4vw, 44px);
    color:#d21414;
    font-weight:900;
    text-align:right;
    letter-spacing:.5px;
}

#qr_code{
    position:absolute;
    left: 82.6%;
    top: 87.0%;
    width: 10.0%;
    height: 8.0%;
    z-index:2;
    object-fit:contain;
}

.not-found{
    max-width: var(--page-w);
    margin: 50px auto;
    padding: 18px 20px;
    background: #fff3f3;
    border: 1px solid #f0b4b4;
    border-radius: 12px;
    color:#8a1717;
    font-weight:700;
    display:none;
}

@media (max-width: 1024px){
    .toolbar{
        padding: 0 10px;
    }
    .field{
        font-size: clamp(10px, 1.9vw, 14px);
    }
}

@media print{
    body{
        background:#fff;
    }
    .toolbar,
    .not-found{
        display:none !important;
    }
    .stage{
        width:100%;
        margin:0;
    }
    .invoice-page{
        box-shadow:none;
        page-break-after: always;
    }
    @page{
        size: A4 portrait;
        margin: 0;
    }
}
</style>
</head>
<body>

<div class="toolbar">
    <button class="secondary" onclick="window.history.back()">Back</button>
    <button onclick="window.print()">Print / Save PDF</button>
</div>

<div class="stage">
    <div class="invoice-page" id="invoicePage">
        <div id="invoice_number" class="field"></div>
        <div id="invoice_date" class="field light"></div>
        <div id="ref_number" class="field light"></div>
        <div id="verification_id" class="field light red"></div>

        <div id="insured_name" class="field light"></div>
        <div id="insured_country" class="field light"></div>
        <div id="insured_city" class="field light"></div>

        <div id="year_of_mfr" class="field light"></div>
        <div id="engine_no" class="field light"></div>
        <div id="chassis_no" class="field light"></div>
        <div id="type_of_body" class="field light"></div>
        <div id="make_model" class="field light"></div>
        <div id="vehicle_permit" class="field light"></div>
        <div id="seating_capacity" class="field light"></div>
        <div id="vehicle_plate_no" class="field light"></div>
        <div id="vehicle_color" class="field light"></div>
        <div id="insured_vehicle_value" class="field light"></div>

        <div id="insurance_company" class="field light"></div>
        <div id="insurance_from" class="field light"></div>
        <div id="insurance_till" class="field light"></div>

        <div id="total_amount" class="field"></div>

        <img id="qr_code" alt="QR Code" />
    </div>
</div>

<div id="message" class="not-found">Invoice Not Found</div>

<script>
const supabaseClient = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

const params = new URLSearchParams(window.location.search);
const verificationId = params.get("id");

function setText(id, value){
    const el = document.getElementById(id);
    if(!el) return;
    el.textContent = value ?? "";
}

function formatDate(value){
    if(!value) return "";
    const d = new Date(value);
    if(Number.isNaN(d.getTime())) return value;
    return new Intl.DateTimeFormat("en-GB", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric"
    }).format(d);
}

async function loadInvoice(){
    if(!verificationId){
        const message = document.getElementById("message");
        message.style.display = "block";
        message.textContent = "Missing verification ID";
        return;
    }

    const { data, error } = await supabaseClient
        .from("invoices")
        .select("*")
        .eq("verification_id", verificationId)
        .maybeSingle();

    if(error || !data){
        const message = document.getElementById("message");
        message.style.display = "block";
        message.textContent = "Invoice Not Found";
        return;
    }

    setText("invoice_number", data.invoice_number);
    setText("invoice_date", formatDate(data.invoice_date));
    setText("ref_number", data.ref_number);
    setText("verification_id", data.verification_id);

    setText("insured_name", data.insured_name);
    setText("insured_country", data.insured_country);
    setText("insured_city", data.insured_city);

    setText("year_of_mfr", data.year_of_mfr);
    setText("engine_no", data.engine_no);
    setText("chassis_no", data.chassis_no);
    setText("type_of_body", data.type_of_body);
    setText("make_model", data.make_model);
    setText("vehicle_permit", data.vehicle_permit);
    setText("seating_capacity", data.seating_capacity);
    setText("vehicle_plate_no", data.vehicle_plate_no);
    setText("vehicle_color", data.vehicle_color);
    setText("insured_vehicle_value", data.insured_vehicle_value);

    setText("insurance_company", data.insurance_company);
    setText("insurance_from", formatDate(data.insurance_from));
    setText("insurance_till", formatDate(data.insurance_till));

    setText("total_amount", data.total_amount);

    if(data.qr_url){
        const qr = document.getElementById("qr_code");
        qr.src = data.qr_url;
        qr.style.display = "block";
    }else{
        document.getElementById("qr_code").style.display = "none";
    }
}

loadInvoice();
</script>

</body>
</html>
