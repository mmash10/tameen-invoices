<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Invoice</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width:1000px;
    margin:20px auto;
    padding:20px;
}

h2{
    margin-top:30px;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    box-sizing:border-box;
}

button{
    padding:12px 20px;
    cursor:pointer;
}
</style>

</head>
<body>

<h1>Tameen Invoice Generator</h1>

<h2>Insured Details</h2>

<input id="insured_name" placeholder="Name">
<input id="insured_country" placeholder="Country">
<input id="insured_city" placeholder="City">

<h2>Vehicle Details</h2>

<input id="year_of_mfr" placeholder="Year of MFR">
<input id="engine_no" placeholder="Engine No">
<input id="chassis_no" placeholder="Chassis No">
<input id="type_of_body" placeholder="Type of Body">
<input id="make_model" placeholder="Make & Model">
<input id="vehicle_permit" placeholder="Vehicle Permit">
<input id="seating_capacity" placeholder="Seating Capacity">
<input id="vehicle_plate_no" placeholder="Vehicle Plate No">
<input id="vehicle_color" placeholder="Vehicle Color">
<input id="insured_vehicle_value" placeholder="Insured Vehicle Value">

<h2>Insurance Details</h2>

<input id="insurance_company" placeholder="Insurance Company">
<input id="insurance_from" type="date">
<input id="insurance_till" type="date">
<input id="total_amount" placeholder="Total Amount">

<br><br>

<button>
Generate Invoice
</button>

</body>
</html>
