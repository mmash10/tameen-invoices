<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Invoice</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width:1000px;
    margin:20px auto;
    padding:20px;
}

h2{
    margin-top:30px;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    box-sizing:border-box;
}

button{
    padding:12px 20px;
    cursor:pointer;
}
</style>

</head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

const supabaseClient = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

function generateInvoiceNumber(){
    return "INV-" + Date.now();
}

function generateRefNumber(){
    return "REF-" + Date.now();
}

function generateVerificationId(){
    return "TAT-" +
    Math.random().toString(36).substring(2,10).toUpperCase();
}

</script>
<body>

<h1>Tameen Invoice Generator</h1>

<h2>Insured Details</h2>

<input id="insured_name" placeholder="Name">
<input id="insured_country" placeholder="Country">
<input id="insured_city" placeholder="City">

<h2>Vehicle Details</h2>

<input id="year_of_mfr" placeholder="Year of MFR">
<input id="engine_no" placeholder="Engine No">
<input id="chassis_no" placeholder="Chassis No">
<input id="type_of_body" placeholder="Type of Body">
<input id="make_model" placeholder="Make & Model">
<input id="vehicle_permit" placeholder="Vehicle Permit">
<input id="seating_capacity" placeholder="Seating Capacity">
<input id="vehicle_plate_no" placeholder="Vehicle Plate No">
<input id="vehicle_color" placeholder="Vehicle Color">
<input id="insured_vehicle_value" placeholder="Insured Vehicle Value">

<h2>Insurance Details</h2>

<input id="insurance_company" placeholder="Insurance Company">
<input id="insurance_from" type="date">
<input id="insurance_till" type="date">
<input id="total_amount" placeholder="Total Amount">

<br><br>

<button onclick="saveInvoice()">
Generate Invoice
</button>

    <script>

async function saveInvoice(){

    const invoiceNumber =
        generateInvoiceNumber();

    const refNumber =
        generateRefNumber();

    const verificationId =
        generateVerificationId();

    const { error } =
    await supabaseClient
    .from("invoices")
    .insert([{

        invoice_number: invoiceNumber,
        verification_id: verificationId,
        ref_number: refNumber,

        invoice_date: new Date(),

        insured_name:
        document.getElementById("insured_name").value,

        insured_country:
        document.getElementById("insured_country").value,

        insured_city:
        document.getElementById("insured_city").value,

        year_of_mfr:
document.getElementById("year_of_mfr").value,

engine_no:
document.getElementById("engine_no").value,

chassis_no:
document.getElementById("chassis_no").value,

type_of_body:
document.getElementById("type_of_body").value,

make_model:
document.getElementById("make_model").value,

vehicle_permit:
document.getElementById("vehicle_permit").value,

seating_capacity:
document.getElementById("seating_capacity").value,

vehicle_plate_no:
document.getElementById("vehicle_plate_no").value,

vehicle_color:
document.getElementById("vehicle_color").value,

insured_vehicle_value:
document.getElementById("insured_vehicle_value").value,

insurance_company:
document.getElementById("insurance_company").value,

insurance_from:
document.getElementById("insurance_from").value,

insurance_till:
document.getElementById("insurance_till").value,

        total_amount:
        document.getElementById("total_amount").value

    }]);

    if(error){
        alert(error.message);
        return;
    }

    alert(
        "Invoice Saved Successfully\n\n" +
        invoiceNumber
    );
}

</script>

</body>
</html>
